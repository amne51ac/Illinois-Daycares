name: Deploy GitHub Pages

# If Configure Pages fails with "Not Found", Pages is not enabled yet. Fix: Repo Settings → Pages →
# Build and deployment → Source: GitHub Actions. (One-time per repository.)
# Custom domain: set under Settings → Pages → Custom domain (see README). The CNAME file copied into _site is optional when using this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html about.html api.html privacy.html terms.html LICENSE CNAME robots.txt sitemap.xml .nojekyll _site/
          cp -r assets _site/
          cp providers.json _site/
          cp export_meta.json _site/
          mkdir -p _site/api/v1
          if [ -f api/v1/providers.json ]; then cp api/v1/providers.json _site/api/v1/providers.json; else cp providers.json _site/api/v1/providers.json; fi
          cp api/v1/provider.schema.json _site/api/v1/provider.schema.json
          mkdir -p _site/api
          cp api/openapi.yaml _site/api/openapi.yaml

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
